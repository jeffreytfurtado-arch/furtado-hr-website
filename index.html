    <link rel="canonical" href="https://www.precisehr.ca/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="PreciseHR" />

    <meta name="twitter:image" content="https://www.precisehr.ca/images/precisehr-og-card.png" />

    <!-- Theme: apply saved/system preference before paint to avoid a flash -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          var dark = t === 'dark' || (!t && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="fs-unmask-airo-app-builder">
    <div id="app" class="fs-unmask-airo-app-builder"></div>
    <script type="module">
      if (import.meta.env.MODE === 'development') {
        import('/dev-tools/src/error-client.ts')
      }
      import('/src/main.tsx')
    </script>
    <script src="/analytics.js"></script>
  </body>
</html>
